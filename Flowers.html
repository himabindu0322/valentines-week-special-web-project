<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Flowers for You 🌸</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    text-align: center;
    background: linear-gradient(to right, #ff9a9e, #fad0c4);
    overflow: hidden;
}

/* Title */
h1 {
    margin-top: 30px;
    font-size: 3em;
    color: white;
}

/* Grid */
.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 20px;
    padding: 20px;
    position: relative;
    z-index: 2;
}

/* Square cards */
.flower {
    aspect-ratio: 1 / 1;
    border-radius: 15px;
    overflow: hidden;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    transition: transform 0.4s;
}

.flower img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* Hover */
.flower:hover {
    transform: scale(1.1);
}

/* Button */
button {
    margin: 20px;
    padding: 12px 25px;
    border: none;
    border-radius: 25px;
    background: white;
    color: #ff4e7a;
    cursor: pointer;
    position: relative;
    z-index: 2;
}

/* ❤️ Floating hearts */
.heart {
    position: absolute;
    color: red;
    font-size: 20px;
    animation: floatUp linear infinite;
    pointer-events: none;
    z-index: 1;
}

@keyframes floatUp {
    0% {
        transform: translateY(100vh) scale(0.8);
        opacity: 1;
    }
    100% {
        transform: translateY(-50px) scale(1.3);
        opacity: 0;
    }
}
</style>
</head>

<body>

<h1>🌸 Beautiful Things Just For You 🌸</h1>

<button onclick="goBack()">⬅ Back</button>

<div class="container">

    <div class="flower">
        <img src="https://picsum.photos/id/102/400/400" alt="Flower">
    </div>

    <div class="flower">
        <img src="https://picsum.photos/id/106/400/400" alt="Flower">
    </div>

    <div class="flower">
        <img src="https://picsum.photos/id/107/400/400" alt="Flower">
    </div>

    <div class="flower">
        <img src="https://picsum.photos/id/108/400/400" alt="Flower">
    </div>

    <div class="flower">
        <img src="https://picsum.photos/id/109/400/400" alt="Flower">
    </div>

    <div class="flower">
        <img src="https://picsum.photos/id/110/400/400" alt="Flower">
    </div>

</div>

<script>

// ❤️ Floating hearts animation
function createHeart() {
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "❤";

    heart.style.left = Math.random() * window.innerWidth + "px";
    heart.style.fontSize = (Math.random() * 20 + 15) + "px";
    heart.style.animationDuration = (Math.random() * 3 + 3) + "s";

    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 6000);
}

// Generate hearts continuously
setInterval(createHeart, 250);

// Back button
function goBack() {
    window.location.href = "index.html";
}

</script>

</body>
</html>
