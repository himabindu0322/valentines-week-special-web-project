<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Rose Day</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: Arial;
    text-align: center;
    background: linear-gradient(to right, #ff4e7a, #ff758c);
}

/* Title */
h1 {
    margin-top: 50px;
    font-size: 3.5em;
    color: white;
    text-shadow: 0 0 10px red, 0 0 20px pink;
    animation: glow 2s infinite alternate;
}

@keyframes glow {
    from { text-shadow: 0 0 10px red; }
    to { text-shadow: 0 0 25px white; }
}

/* Title roses (simple bounce) */
.title-rose {
    display: inline-block;
    animation: bounce 1.2s infinite ease-in-out;
}

.title-rose:first-child {
    animation-delay: 0s;
}
.title-rose:last-child {
    animation-delay: 0.4s;
}

@keyframes bounce {
    0% { transform: translateY(0); }
    50% { transform: translateY(-10px) scale(1.2); }
    100% { transform: translateY(0); }
}

/* Moving text */
.marquee {
    color: white;
    font-size: 1.5em;
    margin-top: 20px;
    overflow: hidden;
    white-space: nowrap;
}

.marquee span {
    display: inline-block;
    animation: moveText 10s linear infinite;
}

@keyframes moveText {
    from { transform: translateX(100%); }
    to { transform: translateX(-100%); }
}

/* Button */
button {
    margin-top: 40px;
    padding: 15px 30px;
    border: none;
    border-radius: 30px;
    font-size: 18px;
    background: white;
    color: #ff4e7a;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #ff4e7a;
    color: white;
}

/* Falling roses */
.rose {
    position: absolute;
    font-size: 25px;
    animation: fall linear infinite;
    pointer-events: none;
}

@keyframes fall {
    0% {
        transform: translateY(-50px) rotate(0deg) scale(0.8);
        opacity: 1;
    }
    50% {
        transform: translateY(50vh) rotate(180deg) scale(1.2);
    }
    100% {
        transform: translateY(100vh) rotate(360deg) scale(0.9);
        opacity: 0;
    }
}

/* Rose petals */
.petal {
    position: absolute;
    width: 12px;
    height: 18px;
    background: pink;
    border-radius: 50%;
    opacity: 0.7;
    animation: petalFall linear infinite;
}

@keyframes petalFall {
    0% {
        transform: translateY(-20px) rotate(0deg);
        opacity: 1;
    }
    100% {
        transform: translateY(100vh) rotate(360deg) translateX(50px);
        opacity: 0;
    }
}

/* Hearts */
.heart {
    position: absolute;
    color: red;
    font-size: 20px;
    animation: float 6s linear infinite;
}

@keyframes float {
    0% { transform: translateY(100vh); opacity: 1; }
    100% { transform: translateY(-50px); opacity: 0; }
}

</style>
</head>

<body>

<h1>
    <span class="title-rose">🌹</span> Happy Rose Day 
    <span class="title-rose">🌹</span>
</h1>

<div class="marquee">
    <span>💖 Sending you lots of love, roses, and happiness 💖</span>
</div>

<button onclick="nextPage()">Click here to present 🎁</button>

<script>

// 🌹 Falling roses
function createRose() {
    let rose = document.createElement("div");
    rose.className = "rose";
    rose.innerHTML = "🌹";

    rose.style.left = Math.random() * window.innerWidth + "px";
    rose.style.animationDuration = (Math.random() * 2 + 2) + "s";

    document.body.appendChild(rose);
    setTimeout(() => rose.remove(), 4000);
}
setInterval(createRose, 100);

// 🌸 Petals
function createPetal() {
    let petal = document.createElement("div");
    petal.className = "petal";

    petal.style.left = Math.random() * window.innerWidth + "px";
    petal.style.animationDuration = (Math.random() * 3 + 3) + "s";

    document.body.appendChild(petal);
    setTimeout(() => petal.remove(), 6000);
}
setInterval(createPetal, 150);

// ❤️ Hearts
function createHeart() {
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "❤";

    heart.style.left = Math.random() * window.innerWidth + "px";
    heart.style.fontSize = (Math.random() * 20 + 10) + "px";

    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 6000);
}
setInterval(createHeart, 300);

// Navigation
function nextPage() {
    window.location.href = "flowers.html";
}

</script>

</body>
</html>
